name: auction-local

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-products_api_development}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-password}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: >
      sh -c "rm -f tmp/pids/server.pid &&
             bundle exec rails db:prepare &&
             bundle exec rails server -b 0.0.0.0 -p 3000"
    environment:
      RAILS_ENV: development
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-password}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:3001,http://localhost:3003}
      FRONTEND_APP_URL: ${FRONTEND_APP_URL:-http://localhost:3001}
      APP_HOST: localhost:3000
      APP_PROTOCOL: http
      RAILS_INTERNAL_HOSTS: ${RAILS_INTERNAL_HOSTS:-backend}
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - backend_bundle:/usr/local/bundle
      - backend_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/health || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
      INTERNAL_API_BASE_URL: http://backend:3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3000
      NEXT_PUBLIC_API_HOST: localhost
      WATCHPACK_POLLING: "true"
    ports:
      - "3001:3001"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
      NUXT_PUBLIC_API_BASE: http://localhost:3000
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3003:3003"
    volumes:
      - ./admin:/app
      - admin_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_local_data:
  backend_bundle:
  backend_storage:
  frontend_node_modules:
  admin_node_modules:
